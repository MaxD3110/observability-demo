# Grafana loads alert rules, contact points and notification templates with no manual setup through the UI.

apiVersion: 1

# 0. Notification template.
# Without it Telegram sends the default field dump ([no value], Labels, Silence URL, etc.)
templates:
  - orgId: 1
    name: telegram.message
    template: |
      {{ define "telegram.message" -}}
      {{ if eq .Status "firing" }}🔴 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }} · {{ .Alerts | len }}
      {{ range .Alerts -}}
      ━━━━━━━━━━━━━━
      <b>{{ .Labels.alertname }}</b>
      {{ if .Labels.provider }}Provider: <b>{{ .Labels.provider }}</b>
      {{ end }}{{ if .Annotations.summary }}{{ .Annotations.summary }}
      {{ end }}Severity: {{ .Labels.severity }}
      {{ if .DashboardURL }}<a href="{{ .DashboardURL }}">Open dashboard</a>{{ end }}
      {{ end -}}
      {{ end }}

# 1. Contact Points
contactPoints:
  - orgId: 1
    name: "Telegram Receiver"
    receivers:
      - uid: telegram_dev_team
        type: telegram
        disableResolveMessage: false # Send a notification when everything has recovered
        settings:
          bottoken: "$__env{TELEGRAM_BOT_TOKEN}"
          chatid: "8378060934"
          parse_mode: "HTML"
          message: '{{ template "telegram.message" . }}'

# 2. Notification Policies
# The routing logic: which alert goes where.
policies:
  - orgId: 1
    receiver: "Telegram Receiver"
    group_by: ["alertname", "provider"]
    group_wait: 10s      # How long to wait before the first notification
    group_interval: 1m   # Pause before sending new alerts in the same group
    repeat_interval: 1h  # How often to remind about an active alert

# 3. Evaluation Groups (alert rules)
groups:
  - orgId: 1
    name: "10s evaluation window"
    folder: "Financial Nano Gateway"
    interval: 10s
    rules:
      - uid: bank_failure_id
        title: 'High % of failed bank outcomes'
        condition: C
        for: 1m
        data:
          - refId: B
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: '100 * (sum by (provider) (rate(bank_request_value_total{outcome="failed"}[5m])) or (sum by (provider) (rate(bank_request_value_total[5m])) * 0)) / clamp_min(sum by (provider) (rate(bank_request_value_total[5m])), 0.001)'
              instant: true
              intervalMs: 10000
              legendFormat: '{{provider}}'
              refId: B
          - refId: C
            queryType: expression
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: B
              intervalMs: 5000
              refId: C
              type: threshold
        dashboardUid: adxhhjv
        panelId: 43
        noDataState: OK
        execErrState: Error
        annotations:
          summary: 'Failed-outcome ratio {{ $values.B.Value | printf "%.1f" }}% over 5 minutes (threshold 10%).'
          __dashboardUid__: adxhhjv
          __panelId__: "43"
        labels:
          severity: critical
