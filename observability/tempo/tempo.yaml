# Grafana Tempo - trace storage. Receives OTLP from the Collector and serves traces to Grafana.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 24h # How long traces are kept. Traces are heavy, so unlike metrics they are kept briefly.
