# Grafana Tempo - хранилище трейсов. Принимает OTLP от Collector и отдает их в Grafana.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 24h # Сколько храним трейсы. Трейсы тяжелые - держат недолго в отличие от метрик.
