# Collector принимает OTLP от приложения и публикует метрики в формате Prometheus.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    # Защищает Collector от OOM (out of memory) при всплесках телеметрии.
    check_interval: 1s
    limit_mib: 384

  batch:
    # Отправляет данные пачками, что обычно эффективнее одиночных отправок.
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      # service.name и deployment.environment становятся Prometheus labels.
      enabled: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

  telemetry:
    logs:
      level: info
    metrics:
      # Метрики самого Collector. Их scrape-ит отдельный Prometheus job.
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
