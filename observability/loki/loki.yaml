auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Lets high-cardinality fields (trace_id, payment.id) be stored as structured metadata
  # instead of labels. Labels in Loki must stay low-cardinality.
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 24h

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
