name: financial-observability-demo

services:
  financial-nano-gateway:
    build:
      context: .
      dockerfile: src/FinancialNanoGateway/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Inline edits to appsettings.json
      - ./src/FinancialNanoGateway/appsettings.json:/app/appsettings.json
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "true"

      OTEL_SERVICE_NAME: financial-nano-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRIC_EXPORT_INTERVAL: 5000
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=Development,service.namespace=financial-demo

      BankAIntegrationOptions__ProviderName: "CheetahBank"
      #BankAIntegrationOptions__FailureRatePercentage: 30
      BankAIntegrationOptions__MinRequestDelayMs: 10
      BankAIntegrationOptions__MaxRequestDelayMs: 500
      BankBIntegrationOptions__ProviderName: "TortoiseBank"
      BankBIntegrationOptions__FailureRatePercentage: 5
      BankBIntegrationOptions__MinRequestDelayMs: 100
      BankBIntegrationOptions__MaxRequestDelayMs: 900
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otelcol/config.yaml"]
    expose:
      - "4317" # OTLP/gRPC from the app
      - "4318" # OTLP/HTTP for compatibility
      - "8888" # Collector's internal metrics
      - "8889" # app metrics for Prometheus
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    expose:
      - "3200" # query API from Grafana
      - "4317" # OTLP/gRPC from the Collector
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    expose:
      - "3100"
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
      # Enables exemplar storage (linking histogram data points to TraceId). Without the flag Prometheus drops them.
      - "--enable-feature=exemplar-storage"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: 12345
      GF_AUTH_ANONYMOUS_ENABLED: "true" # Guest mode, no login required in the UI
      GF_USERS_ALLOW_SIGN_UP: "false" # Disallows new user sign-up from the UI
      # The alerting secret (bot token) is passed in from .env (git-ignored) and stored nowhere in the repo
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

# Fake load generator, serves no other purpose
  payment-load-generator:
    image: curlimages/curl:8.10.1
    depends_on:
      financial-nano-gateway:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          amount=$$(awk 'BEGIN { srand(); printf "%.2f", 1 + rand() * 250 }')
          currency=$$(awk 'BEGIN { split("USD EUR GBP", c, " "); srand(); print c[int(rand() * 3) + 1] }')
          curl -s -o /dev/null -w "%{http_code}\n" \
            -H "Content-Type: application/json" \
            -d "{\"amount\":$${amount},\"currency\":\"$${currency}\"}" \
            http://financial-nano-gateway:8080/api/payments
          sleep 0.2
        done
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
