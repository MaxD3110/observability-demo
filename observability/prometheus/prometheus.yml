# Prometheus забирает метрики по pull-модели и хранит их как time-series.

global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

rule_files:
  # Правила держим в Git рядом с конфигурацией, чтобы dashboards и alerts были воспроизводимыми.
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: financial-nano-gateway
    # Приложение не отдает /metrics напрямую. Prometheus scrape-ит endpoint Collector.
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: otel-collector
    # Внутренние метрики Collector показывают здоровье telemetry pipeline.
    static_configs:
      - targets:
          - otel-collector:8888

  - job_name: prometheus
    # Prometheus тоже мониторит сам себя.
    static_configs:
      - targets:
          - prometheus:9090
