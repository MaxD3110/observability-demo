# Grafana creates the Tempo datasource automatically on startup.
apiVersion: 1

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        spanStartTimeShift: '-5m' # time slack, since a log and its span are not written perfectly in sync
        spanEndTimeShift: '5m'
        tags:
          - key: 'service.name'
            value: 'service_name'
      nodeGraph:
        enabled: true
