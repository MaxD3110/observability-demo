receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    # Protects the Collector from OOM (out of memory) during telemetry spikes.
    check_interval: 1s
    limit_mib: 384

  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      # service.name and deployment.environment become Prometheus labels.
      enabled: true
    # Exemplars are only exposed in the OpenMetrics format. Without this flag Prometheus
    # will not see the link from histogram data points to TraceId.
    enable_open_metrics: true

  otlp/tempo:
    # Traces go to Tempo over OTLP/gRPC.
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    # Logs go to Loki via its native OTLP endpoint (/otlp/v1/logs is appended automatically).
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]

  telemetry:
    logs:
      level: info
    metrics:
      # The Collector's own metrics. A separate Prometheus job scrapes them.
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
