# Prometheus pulls metrics (pull model) and stores them as time series.

global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

rule_files:
  # Rules live in Git next to the config so dashboards and alerts are reproducible.
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: financial-nano-gateway
    # The app does not expose /metrics directly. Prometheus scrapes the Collector's endpoint.
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: otel-collector
    # The Collector's internal metrics show the health of the telemetry pipeline.
    static_configs:
      - targets:
          - otel-collector:8888

  - job_name: prometheus
    # Prometheus monitors itself too.
    static_configs:
      - targets:
          - prometheus:9090
