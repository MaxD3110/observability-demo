# Grafana загружает dashboard JSON из папки dashboards, без ручной настройки через UI.
apiVersion: 1

providers:
  - name: Financial Monitoring
    folder: Financial Nano Gateway
    type: file
    allowUiUpdates: false # Дашборды read-only и не могут меняться в webUi графаны.
    options:
      path: /var/lib/grafana/dashboards
