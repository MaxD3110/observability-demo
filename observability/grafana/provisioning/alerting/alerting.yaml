# Grafana загружает правила алертов, контактные точки и шаблоны уведомлений без ручной настройки через UI.

apiVersion: 1

# 0. Шаблон уведомления.
# Без него Telegram присылает дефолтный дамп полей ([no value], Labels, Silence URL и т.д.).
# Здесь делаем короткое читаемое сообщение в HTML.
templates:
  - orgId: 1
    name: telegram.message
    template: |
      {{ define "telegram.message" -}}
      {{ if eq .Status "firing" }}🔴 <b>ТРЕВОГА</b>{{ else }}✅ <b>ВОССТАНОВЛЕНО</b>{{ end }} · {{ .Alerts | len }}
      {{ range .Alerts -}}
      ━━━━━━━━━━━━━━
      <b>{{ .Labels.alertname }}</b>
      {{ if .Labels.provider }}Провайдер: <b>{{ .Labels.provider }}</b>
      {{ end }}{{ if .Annotations.summary }}{{ .Annotations.summary }}
      {{ end }}Важность: {{ .Labels.severity }}
      {{ if .DashboardURL }}<a href="{{ .DashboardURL }}">Открыть дашборд</a>{{ end }}
      {{ end -}}
      {{ end }}

# 1. Контактные точки (Contact Points)
contactPoints:
  - orgId: 1
    name: "Telegram Receiver"
    receivers:
      - uid: telegram_dev_team
        type: telegram
        disableResolveMessage: false # Присылать уведомление, когда всё починилось
        settings:
          bottoken: "$__env{TELEGRAM_BOT_TOKEN}"
          chatid: "8378060934"
          parse_mode: "HTML"
          message: '{{ template "telegram.message" . }}'

# 2. Политики уведомлений (Notification Policies)
# Это логика: какой алерт куда отправлять
policies:
  - orgId: 1
    receiver: "Telegram Receiver"
    group_by: ["alertname", "provider"]
    group_wait: 10s      # Сколько ждать перед первой отправкой
    group_interval: 1m   # Пауза перед отправкой новых алертов в той же группе
    repeat_interval: 1h  # Как часто напоминать об активном алерте

# 3. Группы алертов и правила (Evaluation Groups)
groups:
  - orgId: 1
    name: "Окно проверки 10s"
    folder: "Financial Nano Gateway"
    interval: 10s
    rules:
      - uid: bank_failure_id
        # Заголовок статичный: в title Grafana НЕ подставляет $labels. Провайдер уходит в аннотацию и метки.
        title: 'Высокий % ошибочных исходов по банку'
        condition: C
        for: 1m
        data:
          - refId: B
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              # NoData-устойчивый запрос. Проблема исходной версии: при нуле ошибок у провайдера
              # числитель (outcome="failed") не возвращал серию -> деление давало пустоту -> DatasourceNoData.
              # Приём `or (<знаменатель> * 0)` гарантирует 0 для каждого провайдера, у кого есть трафик.
              # Интервал зафиксирован [5m] вместо $__rate_interval - детерминированно и совпадает с окном 300s.
              expr: '100 * (sum by (provider) (rate(bank_request_value_total{outcome="failed"}[5m])) or (sum by (provider) (rate(bank_request_value_total[5m])) * 0)) / clamp_min(sum by (provider) (rate(bank_request_value_total[5m])), 0.001)'
              instant: true
              intervalMs: 10000
              legendFormat: '{{provider}}'
              refId: B
          - refId: C
            queryType: expression
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: B
              intervalMs: 5000
              refId: C
              type: threshold
        dashboardUid: adxhhjv
        panelId: 43
        # Запрос теперь всегда возвращает значение, поэтому "нет данных" = реально мёртвый источник, а не норма.
        noDataState: OK
        execErrState: Error
        annotations:
          summary: 'Доля ошибочных исходов {{ $values.B.Value | printf "%.1f" }}% за 5 минут (порог 10%).'
          __dashboardUid__: adxhhjv
          __panelId__: "43"
        labels:
          severity: critical
