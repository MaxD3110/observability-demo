receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    # Защищает Collector от OOM (out of memory) при всплесках телеметрии.
    check_interval: 1s
    limit_mib: 384

  batch:
    # Отправляет данные пачками, что обычно эффективнее одиночных отправок.
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      # service.name и deployment.environment становятся Prometheus labels.
      enabled: true
    # Exemplars экспонируются только в формате OpenMetrics. Без этого флага Prometheus
    # не увидит привязку точек гистограмм к TraceId.
    enable_open_metrics: true

  otlp/tempo:
    # Трейсы уходят в Tempo по OTLP/gRPC.
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    # Логи уходят в Loki по нативному OTLP-эндпоинту (/otlp/v1/logs добавляется автоматически).
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]

  telemetry:
    logs:
      level: info
    metrics:
      # Метрики самого Collector. Их scrape-ит отдельный Prometheus job.
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
