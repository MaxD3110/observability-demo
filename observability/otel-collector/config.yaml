# Collector принимает OTLP от приложения: метрики публикует в формате Prometheus, трейсы шлет в Tempo.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    # Защищает Collector от OOM (out of memory) при всплесках телеметрии.
    check_interval: 1s
    limit_mib: 384

  batch:
    # Отправляет данные пачками, что обычно эффективнее одиночных отправок.
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      # service.name и deployment.environment становятся Prometheus labels.
      enabled: true

  otlp/tempo:
    # Трейсы уходят в Tempo по OTLP/gRPC.
    endpoint: tempo:4317
    tls:
      insecure: true # Внутри docker-сети TLS не нужен.

service:
  pipelines:
    # Один и тот же OTLP receiver кормит две независимые pipeline - метрики и трейсы.
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

  telemetry:
    logs:
      level: info
    metrics:
      # Метрики самого Collector. Их scrape-ит отдельный Prometheus job.
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
